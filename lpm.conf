#
# /etc/lpm/lpm.conf — Lotus Package Manager configuration
# Do not edit this file unless you fully understand what you are doing.
# You are responsible for any damage caused.
#

# ────────────────────────────────────────────────────────────────────────────
# BUILD ENVIRONMENT
# ────────────────────────────────────────────────────────────────────────────

# CFLAGS — flags passed to C compiler for every build
# Default: safe hardening flags
#
CFLAGS = -O2 -pipe -fstack-protector-strong -D_FORTIFY_SOURCE=2

# CXXFLAGS — flags passed to C++ compiler
# If unset, inherits CFLAGS automatically
#
CXXFLAGS = -O2 -pipe -fstack-protector-strong -D_FORTIFY_SOURCE=2

# LDFLAGS — linker flags passed to every build
# Default: RELRO + BIND_NOW for security
#
LDFLAGS = -Wl,-z,relro,-z,now

# MAKEFLAGS — extra flags passed to make
# Leave empty to let JOBS control parallelism automatically
# Example: MAKEFLAGS = -j4
#
MAKEFLAGS = -j4

# CC — C compiler to use
#
CC = gcc

# CXX — C++ compiler to use
#
CXX = g++

# JOBS — number of parallel jobs for make
# 0 = auto-detect (uses nproc)
#
JOBS = 0

# ────────────────────────────────────────────────────────────────────────────
# BUILD PATHS
# ────────────────────────────────────────────────────────────────────────────

# BUILDDIR — where source is extracted and packages are built
#
BUILDDIR = /var/cache/lpm

# PKGDEST — where finished package archives go (if using pkg format)
#
PKGDEST = /var/cache/lpm

# SRCDEST — where downloaded source tarballs are cached
#
SRCDEST = /var/cache/lpm

# ────────────────────────────────────────────────────────────────────────────
# BEHAVIOR
# ────────────────────────────────────────────────────────────────────────────

# DEFAULT_YES — skip all confirmation prompts (equivalent to --yes globally)
# y = always yes | n = always prompt (default)
#
DEFAULT_YES = y

# DEFAULT_STRICT — treat check() failure as fatal (equivalent to --strict globally)
# y = block install on test failure | n = warn only (default)
#
DEFAULT_STRICT = n

# RUN_CHECK — automatically run check() after build without prompting
# y = always run | n = ask each time (default)
#
RUN_CHECK = n

# STRICT_BUILD — alias for DEFAULT_STRICT, checked by build pipeline
#
STRICT_BUILD = n

# COLOR — colored output
# 1 = enabled (default) | 0 = disabled
#
COLOR = 1

# CONFIRM — ask confirmation before install/remove
# 1 = enabled (default) | 0 = skip
#
CONFIRM = 1

# KEEP_SRC — keep source directory after build (useful for debugging)
# 0 = clean up (default) | 1 = keep
#
KEEP_SRC = 0

# KEEP_PKG — keep staged pkg directory after install
# 0 = clean up (default) | 1 = keep
#
KEEP_PKG = 0

# CHECK_SPACE — check available disk space before build
# 1 = enabled (default) | 0 = skip
#
CHECK_SPACE = 1

# ────────────────────────────────────────────────────────────────────────────
# DOWNLOADER
# ────────────────────────────────────────────────────────────────────────────

# DOWNLOADER — preferred download tool
# auto = try wget first, fallback to curl (default)
# wget | curl
#
DOWNLOADER = auto

# PARALLEL_DL — download multiple sources at the same time
# 1 = enabled (default) | 0 = sequential
#
PARALLEL_DL = 1

# MAX_DL_THREADS — max parallel download threads (1–16)
#
MAX_DL_THREADS = 4

# VERIFY_SIG — verify GPG signature if .sig file is present
# 0 = disabled (default) | 1 = enabled
#
VERIFY_SIG = 0

# ────────────────────────────────────────────────────────────────────────────
# LOGGING
# ────────────────────────────────────────────────────────────────────────────

# LogDir — directory for per-package build logs
# Each package gets its own <pkgname>.log, overwritten each build
#
LogDir = /var/log/lpm

# FilesDir — root directory for the file ownership database
# Each installed package has a files.list under this directory
#
FilesDir = /var/lib/lpm/files

# ────────────────────────────────────────────────────────────────────────────
# PACKAGE PROTECTION
# ────────────────────────────────────────────────────────────────────────────

# CriticalPkg — packages requiring triple-YES confirmation before removal
# Space-separated list. Multiple lines are merged.
#
CriticalPkg = glibc gcc binutils bash coreutils sed grep gawk
CriticalPkg = findutils tar make patch perl python3 openssl
CriticalPkg = linux dinit lpm busybox

# IgnorePkg — packages skipped during 'lpm -u'
# Can still be updated manually with 'lpm -S <pkg>'
# Space-separated list. Leave empty to update everything.
#
IgnorePkg =
